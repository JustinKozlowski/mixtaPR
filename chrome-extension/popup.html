<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MixtaPR</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 14px;
      color: #24292f;
      background: #fff;
    }
    .header {
      padding: 12px 16px;
      background: #f6f8fa;
      border-bottom: 1px solid #d0d7de;
      font-weight: 600;
      font-size: 15px;
    }
    .content { padding: 16px; }
    button {
      width: 100%;
      padding: 7px 14px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
    }
    .btn-auth { background: #1DB954; color: #fff; }
    .btn-auth:hover { background: #1aa34a; }
    .btn-auth:disabled { opacity: 0.6; cursor: not-allowed; }
    .status {
      margin-top: 10px;
      font-size: 12px;
      color: #57606a;
      min-height: 1.2em;
      text-align: center;
    }
    .status.error { color: #cf222e; }
    .status.success { color: #1a7f37; }
  </style>
</head>
<body>
  <div class="header">🎵 MixtaPR</div>
  <div class="content">
    <button class="btn-auth" id="authBtn">Authorize Spotify</button>
    <p class="status" id="status"></p>
  </div>
  <script src="popup.js"></script>
</body>
</html>
